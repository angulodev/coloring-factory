name: Generar libro

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Título del libro'
        required: true
        default: 'Mandalas para Colorear'
      pages:
        description: 'Cantidad de páginas'
        required: true
        default: '50'
      source:
        description: 'Fuente de las imágenes'
        type: choice
        options: [procedural, ai, ai-free, manual]
        default: procedural
      theme:
        description: 'Tema (solo para source=ai). Ej: "mandala de lobo", "bosque encantado estilo mandala"'
        required: false
        default: 'mandala floral intrincado'
      seed:
        description: 'Seed base (solo procedural; cambia entre volúmenes)'
        required: false
        default: '1000'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generar imágenes con IA gratis (Cloudflare)
        if: inputs.source == 'ai-free'
        env:
          AI_PROVIDER: cloudflare
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node src/ai-generate.js "${{ inputs.theme }}" "${{ inputs.pages }}" output/ai-png

      - name: Generar imágenes con IA
        if: inputs.source == 'ai'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/ai-generate.js "${{ inputs.theme }}" "${{ inputs.pages }}" output/ai-png

      - name: Armar libro (modo IA)
        if: inputs.source == 'ai' || inputs.source == 'ai-free'
        run: node src/build-book.js "${{ inputs.title }}" "${{ inputs.pages }}" 0 output/ai-png

      - name: Limpiar imágenes manuales
        if: inputs.source == 'manual'
        run: node src/prepare-images.js input-images output/clean-png

      - name: Armar libro (modo manual)
        if: inputs.source == 'manual'
        run: node src/build-book.js "${{ inputs.title }}" "999" 0 output/clean-png

      - name: Armar libro (modo procedural)
        if: inputs.source == 'procedural'
        run: node src/build-book.js "${{ inputs.title }}" "${{ inputs.pages }}" "${{ inputs.seed }}"

      - name: Subir PDF como artifact
        uses: actions/upload-artifact@v4
        with:
          name: libro-${{ inputs.source }}-${{ github.run_number }}
          path: output/
          retention-days: 30
